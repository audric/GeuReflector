services:
  svxreflector:
    build: .
    restart: unless-stopped
    ports:
      - "5300:5300/tcp"
      - "5300:5300/udp"
      - "5302:5302/tcp"
      - "8080:8080/tcp"       # remove if HTTP_SRV_PORT is not set in config
    volumes:
      - ./config/svxreflector.conf:/etc/svxlink/svxreflector.conf:ro
      - pki:/etc/svxlink/pki  # persistent storage for certificates

volumes:
  pki:
